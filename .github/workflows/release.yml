name: Release

# One `vX.Y.Z` tag ships everything: the public npm packages + the ghcr image.
# pnpm publish skips versions already on the registry, so re-running is idempotent
# and only packages whose version was bumped actually publish.
# (Python SDK releases independently via publish-python-sdk.yml on `python-sdk-v*`.)

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      docker_tag:
        description: 'Manual image tag (docker job only)'
        required: false
        default: 'latest'

jobs:
  npm:
    # Publishes the 6 public packages: @agentlensai/{server,mcp,core,cli,sdk} + agentkit-auth
    # (a required dep of server). The @agentlensai/* glob also matches the private
    # dashboard/api-spec/sdk-integration-tests packages, but `publish` skips private ones.
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # npm provenance
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.18.2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test
      - name: Publish public packages
        run: pnpm publish -r --filter "@agentlensai/*" --filter agentkit-auth --access public --no-git-checks --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  docker:
    # Builds and pushes the public image to ghcr.io/agentkitai/agentlens using the
    # built-in GITHUB_TOKEN — no Docker Hub credentials needed.
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/agentkitai/agentlens
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=${{ inputs.docker_tag }},enable=${{ github.event_name == 'workflow_dispatch' }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    labels:
      - security
    open-pull-requests-limit: 10
  - package-ecosystem: pip
    directory: /packages/python-sdk
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
  - package-ecosystem: gomod
    directory: /sdks/go
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
  - package-ecosystem: gradle
    directory: /sdks/java
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
